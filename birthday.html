<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday Ananya 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --pink:    #e8607a;
  --pink-l:  #f2a0b0;
  --pink-d:  #c04060;
  --white:   #fff8f9;
  --cream:   #fdf0f3;
  --gold:    #fedd89;
  --deep:    #2d1520;
  --panel:   #ffffff;
  --shadow:  rgba(200,60,100,0.18);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--cream);
  font-family: 'Lora', serif;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

#intro {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, #1a0a0f 0%, #3d1025 60%, #1a0a0f 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 2000;
  transition: opacity 0.9s ease, visibility 0.9s;
}
#intro.gone { opacity:0; visibility:hidden; pointer-events:none; }

.sparkles { position:absolute; inset:0; overflow:hidden; }
.sp {
  position:absolute; border-radius:50%;
  background: radial-gradient(circle, white 0%, rgba(255,255,255,0) 70%);
  animation: sparkleAnim var(--d,4s) ease-in-out infinite;
  animation-delay: var(--dl,0s);
}
@keyframes sparkleAnim {
  0%,100% { opacity:0.1; transform:scale(0.8); }
  50% { opacity:0.8; transform:scale(1.2); }
}

.intro-inner { text-align:center; z-index:1; padding:2rem; }
.gift-icon {
  font-size: 5rem; display:block;
  animation: floatBig 3s ease-in-out infinite;
  margin-bottom: 1.2rem;
  filter: drop-shadow(0 0 20px rgba(232,96,122,0.6));
}
@keyframes floatBig {
  0%,100%{transform:translateY(0) rotate(-3deg);}
  50%{transform:translateY(-14px) rotate(3deg);}
}
.intro-inner h1 {
  font-family:'Playfair Display',serif;
  font-size: clamp(2.2rem,9vw,3.8rem);
  color: #ffd6df;
  line-height:1.15;
  margin-bottom:.6rem;
}
.intro-inner h1 span { color: var(--gold); }
.intro-inner p {
  color: rgba(255,200,210,0.75);
  font-size: clamp(.9rem,3.5vw,1.15rem);
  font-style:italic; margin-bottom:2.2rem;
}
.start-btn {
  background: linear-gradient(135deg, var(--pink-d), var(--pink));
  color:white; border:none;
  padding: .95rem 3rem;
  font-family:'Playfair Display',serif;
  font-size:1.15rem; border-radius:50px;
  cursor:pointer; letter-spacing:.04em;
  box-shadow: 0 8px 28px rgba(232,96,122,0.45);
  transition: transform .2s, box-shadow .2s;
}
.start-btn:hover{transform:scale(1.06);box-shadow:0 12px 36px rgba(232,96,122,0.6);}
.start-btn:active{transform:scale(.97);}

#stage {
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center;
  padding: 1.5rem 1rem 5rem;
  background:
    radial-gradient(ellipse at 15% 5%, rgba(232,96,122,.12) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 95%, rgba(212,168,67,.1) 0%, transparent 45%),
    var(--cream);
}

.stage-top {
  text-align:center; margin-bottom:1.2rem;
}
.stage-top h2 {
  font-family:'Playfair Display',serif;
  font-size: clamp(1.3rem,5vw,2rem);
  color: var(--deep);
}
.stage-top p {
  color: var(--pink); font-style:italic;
  font-size:.9rem; margin-top:.3rem;
}

.progress { display:flex; gap:8px; margin-bottom:1.4rem; align-items:center; }
.pdot {
  width:9px;height:9px;border-radius:50%;
  background:#e8c0c8; transition:all .4s;
}
.pdot.active{background:var(--pink);transform:scale(1.4);}
.pdot.done{background:var(--gold);}

.ebox-wrap {
  position:relative;
  display:none;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:520px;
}
.ebox-wrap.active { display:flex; }

.closed-box {
  position:relative;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center;
  animation: popIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes popIn{
  from{opacity:0;transform:scale(.65) translateY(24px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}

.cb-lid {
  position:relative;
  border-radius: 8px 8px 0 0;
  z-index:2;
  transition: transform .5s cubic-bezier(.34,1.56,.64,1);
  display:flex; align-items:center; justify-content:center;
}
.cb-lid .bow { font-size:2.8rem; position:absolute; top:-22px; }
.ribbon-v {
  position:absolute; left:50%; top:0;
  transform:translateX(-50%);
  width:18px; height:100%; background:rgba(255,255,255,.3); border-radius:2px;
}
.cb-base {
  border-radius: 0 0 10px 10px;
  position:relative; overflow:hidden;
}
.cb-base .ribbon-v { z-index:2; }
.cb-base .ribbon-h {
  position:absolute; top:50%; left:0;
  transform:translateY(-50%);
  width:100%; height:18px; background:rgba(255,255,255,.3); z-index:2;
}

/* ── BIGGER BOX SIZES ── */
.ebox-wrap[data-lv="1"] .cb-lid  { width:240px; height:52px; }
.ebox-wrap[data-lv="1"] .cb-base { width:240px; height:240px; }
.ebox-wrap[data-lv="2"] .cb-lid  { width:216px; height:48px; }
.ebox-wrap[data-lv="2"] .cb-base { width:216px; height:216px; }
.ebox-wrap[data-lv="3"] .cb-lid  { width:192px; height:44px; }
.ebox-wrap[data-lv="3"] .cb-base { width:192px; height:192px; }
.ebox-wrap[data-lv="4"] .cb-lid  { width:168px; height:38px; }
.ebox-wrap[data-lv="4"] .cb-base { width:168px; height:168px; }
.ebox-wrap[data-lv="5"] .cb-lid  { width:144px; height:32px; }
.ebox-wrap[data-lv="5"] .cb-base { width:144px; height:144px; }

.exploded-wrap {
  display:none;
  position:relative;
  animation: popIn .5s forwards;
}
.exploded-wrap.show { display:block; }

.cross {
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  grid-template-rows:    1fr auto 1fr;
  gap: 4px;
  align-items:center; justify-items:center;
}

.panel {
  background: white;
  border-radius: 8px;
  overflow:hidden;
  box-shadow: 0 4px 18px var(--shadow);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  position:relative;
}

/* ── BIGGER PANEL SIZES ── */
.ebox-wrap[data-lv="1"] .panel { width:180px; height:180px; }
.ebox-wrap[data-lv="2"] .panel { width:168px; height:168px; }
.ebox-wrap[data-lv="3"] .panel { width:156px; height:156px; }
.ebox-wrap[data-lv="4"] .panel { width:144px; height:144px; }
.ebox-wrap[data-lv="5"] .panel { width:132px; height:132px; }

.center-cell {
  grid-column:2; grid-row:2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative;
}
.center-box-face {
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 6px 24px var(--shadow);
  overflow:hidden; position:relative;
}

/* ── BIGGER CENTER FACE SIZES ── */
.ebox-wrap[data-lv="1"] .center-box-face { width:180px; height:180px; }
.ebox-wrap[data-lv="2"] .center-box-face { width:168px; height:168px; }
.ebox-wrap[data-lv="3"] .center-box-face { width:156px; height:156px; }
.ebox-wrap[data-lv="4"] .center-box-face { width:144px; height:144px; }
.ebox-wrap[data-lv="5"] .center-box-face { width:132px; height:132px; }

.center-box-face .ribbon-v,
.center-box-face .ribbon-h {
  position:absolute; background:rgba(255,255,255,.3); z-index:1;
}
.center-box-face .ribbon-v { left:50%; transform:translateX(-50%); width:14px; height:100%; }
.center-box-face .ribbon-h { top:50%; transform:translateY(-50%); width:100%; height:14px; }

.msg-card {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  padding:.7rem; background:white;
  position:absolute; inset:0; z-index:5;
  border-radius:8px;
  opacity:0; pointer-events:none;
  transition: opacity .5s;
  text-align:center;
}
.msg-card.show { opacity:1; pointer-events:all; }
.msg-card p {
  font-family:'Playfair Display',serif;
  font-size:clamp(.6rem,2.5vw,.85rem);
  color: var(--deep);
  line-height:1.5;
  font-style:italic;
}

.panel-top    { grid-column:2; grid-row:1; transform-origin:bottom center; animation: foldDown .6s cubic-bezier(.34,1.56,.64,1) .15s both; }
.panel-bottom { grid-column:2; grid-row:3; transform-origin:top center;   animation: foldUp   .6s cubic-bezier(.34,1.56,.64,1) .25s both; }
.panel-left   { grid-column:1; grid-row:2; transform-origin:right center;  animation: foldRight .6s cubic-bezier(.34,1.56,.64,1) .2s both; }
.panel-right  { grid-column:3; grid-row:2; transform-origin:left center;   animation: foldLeft  .6s cubic-bezier(.34,1.56,.64,1) .3s both; }

@keyframes foldDown  { from{opacity:0;transform:rotateX(-90deg) translateY(-20px);} to{opacity:1;transform:rotateX(0) translateY(0);} }
@keyframes foldUp    { from{opacity:0;transform:rotateX(90deg)  translateY(20px);}  to{opacity:1;transform:rotateX(0) translateY(0);} }
@keyframes foldRight { from{opacity:0;transform:rotateY(90deg)  translateX(-20px);} to{opacity:1;transform:rotateY(0) translateX(0);} }
@keyframes foldLeft  { from{opacity:0;transform:rotateY(-90deg) translateX(20px);}  to{opacity:1;transform:rotateY(0) translateX(0);} }

.panel img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.ph-slot {
  width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:4px; font-size:.65rem;
  color: rgba(180,80,100,.6);
  font-family:'Lora',serif;
  background: linear-gradient(135deg, #fff0f3, #ffe4ec);
}
.ph-slot .phi { font-size:2.2rem; }

.reveal-msg-btn {
  position:absolute; inset:0; z-index:4;
  background:rgba(42,21,32,.0);
  border:none; cursor:pointer;
  border-radius:8px;
  transition: background .3s;
}
.reveal-msg-btn:hover { background:rgba(42,21,32,.08); }

.next-btn {
  margin-top:1.2rem;
  background: linear-gradient(135deg, var(--pink-d), var(--pink));
  color:white; border:none;
  padding:.75rem 2.2rem;
  font-family:'Playfair Display',serif;
  font-size:.95rem; border-radius:50px;
  cursor:pointer;
  box-shadow: 0 6px 22px rgba(200,60,100,.3);
  display:none; animation:popIn .4s forwards;
  transition: transform .2s;
}
.next-btn.show { display:block; }
.next-btn:hover { transform:scale(1.06); }

.tap-hint {
  margin-top:1rem;
  font-size:.8rem; color:var(--pink);
  font-style:italic;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.4;}50%{opacity:1;}}

.lid-flyaway {
  animation: lidFly .7s cubic-bezier(.55,.05,.55,.95) forwards !important;
}
@keyframes lidFly {
  0%   { transform:translateY(0) scale(1) rotate(0deg); opacity:1; }
  100% { transform:translateY(-160px) scale(.5) rotate(-30deg); opacity:0; }
}

.cpiece {
  position:fixed; pointer-events:none; z-index:9999;
  animation: cfall linear forwards;
}
@keyframes cfall {
  0%   { transform:translateY(-10px) rotate(0deg); opacity:1; }
  100% { transform:translateY(105vh) rotate(720deg); opacity:0; }
}

#final {
  display:none; flex-direction:column;
  align-items:center; text-align:center;
  padding:1rem 1.5rem 4rem;
  max-width:420px; width:100%;
}
#final.show { display:flex; animation:popIn .8s forwards; }

.bouquet-wrap {
  margin: .5rem 0 1rem;
  position:relative;
}
.bouquet-big { font-size:5rem; display:block; animation:floatBig 3s ease-in-out infinite; }
.flower-ring {
  display:flex; justify-content:center; gap:.4rem; flex-wrap:wrap; margin-top:.4rem;
}
.flower-ring span {
  font-size:2rem;
  animation:floatBig var(--fd,3s) ease-in-out infinite;
  animation-delay:var(--fdl,0s);
}

.final-card {
  background: linear-gradient(135deg, #fff0f5, #fffaf0);
  border: 1.5px solid rgba(232,96,122,.2);
  border-radius:20px; padding:2rem 1.5rem;
  box-shadow: 0 12px 40px rgba(200,60,100,.1);
  margin:.8rem 0;
}
.final-card h2 {
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,6vw,2.2rem);
  color:var(--deep); margin-bottom:.8rem;
}
.final-card p {
  color:#5a2535;
  font-size:clamp(.9rem,3.5vw,1.05rem);
  line-height:1.9; font-style:italic;
}

.photo-strip {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px; width:100%; margin-top:1.2rem;
}
.strip-ph {
  aspect-ratio:1; border-radius:8px; overflow:hidden;
  background:linear-gradient(135deg,#ffe4ec,#fff0f3);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:.55rem; color:var(--pink); gap:2px;
}
.strip-ph img { width:100%; height:100%; object-fit:cover; }

.replay-btn {
  margin-top:2rem;
  background:transparent; color:var(--pink-d);
  border:1.5px solid var(--pink-d);
  padding:.65rem 2rem;
  font-family:'Lora',serif; font-size:.95rem;
  border-radius:50px; cursor:pointer;
  font-style:italic; transition:all .3s;
}
.replay-btn:hover { background:var(--pink-d); color:white; }

</style>
</head>

    <span class="gift-icon">🎁</span>

      <h2>Twenty & Blooming 🥂</h2>
      <p id="finalMsgText"></p>
    </div>
    <div class="photo-strip" id="finalStrip"></div>
    <button class="replay-btn" onclick="restart()">↩ Open again from the start</button>
  </div>
</div>

<script>
const BOXES = [
  {
    color: ["#e05070","#f07090"],
    ribbon: "rgba(255,220,230,.35)",
    message: "Dear Ananya. If it wasn't for you I would not have goone to so many free events. Anyways this gift has 20 photos from all the shit we did in uni. I hope u like it. So lets start from the beginning shall we.",
    photos: [
      { src: "photo1.jpeg", label: "Photo 1" },
      { src: "photo2.jpeg", label: "Photo 2" },
      { src: "photo3.jpeg", label: "Photo 3" },
      { src: "photo4.jpeg", label: "Photo 4" },
    ]
  },
  {
    color: ["#b8860b","#d4a843"],
    ribbon: "rgba(255,240,200,.35)",
    message: "I dont remember how we met but I'm glad we did!. You really stood by me during my hard time and help me come back. ",
    photos: [
      { src: "photo5.jpeg", label: "Photo 5" },
      { src: "photo6.jpeg", label: "Photo 6" },
      { src: "photo7.jpeg", label: "Photo 7" },
      { src: "photo8.jpeg", label: "Photo 8" },
    ]
  },
  {
    color: ["#9b4dca","#c07de0"],
    ribbon: "rgba(240,220,255,.35)",
    message: "You never said no to all the crazy ideas I had and that is one of the things I love about you. ",
    photos: [
      { src: "photo9.jpeg", label: "Photo 9" },
      { src: "photo10.jpeg", label: "Photo 10" },
      { src: "photo11.jpeg", label: "Photo 11" },
      { src: "photo12.jpeg", label: "Photo 12" },
    ]
  },
  {
    color: ["#2a7d6b","#4db899"],
    ribbon: "rgba(200,255,240,.35)",
    message: "Every adventure with you has been my favourite adventure. Thank you for choosing me 🌍💚",
    photos: [
      { src: "photo13.jpeg", label: "Photo 13" },
      { src: "photo14.jpeg", label: "Photo 14" },
      { src: "photo15.jpeg", label: "Photo 15" },
      { src: "photo16.jpeg", label: "Photo 16" },
    ]
  },
  {
    color: ["#c0506a","#e8d5a3"],
    ribbon: "rgba(255,245,220,.35)",
    message: "And here — at the very heart of it all — it's just us and the future ahead of us. 💛",
    photos: [ 
      { src: "photo17.jpeg", label: "Photo 17" },
      { src: "photo18.jpeg", label: "Photo 18" },
      { src: "photo19.jpeg", label: "Photo 19" },
      { src: "photo20.jpeg", label: "Photo 20" },
    ]
  }
];

const FINAL_MSG = `Here's to twenty years of being absolutely wonderful.\n\nYou've grown into someone extraordinary — kind, brave, and endlessly beautiful inside and out. Every memory we've shared is one of my greatest treasures.\n\nHappy Birthday, my partner in Crime. The best is still to come. 🌷`;

let current = 0;
let msgRevealed = false;

const spEl = document.getElementById('sparkles');
for(let i=0;i<60;i++){
  const s = document.createElement('div');
  s.className='sp';
  const sz = 2+Math.random()*5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*4}s;`;
  spEl.appendChild(s);
}

function startJourney(){
  document.getElementById('intro').classList.add('gone');
  buildProgress();
  renderBox(0);
}

function buildProgress(){
  const p = document.getElementById('progress');
  p.innerHTML='';
  BOXES.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i<current?' done':i===current?' active':'');
    p.appendChild(d);
  });
}

const TITLES = ['Box 1 of 5','Box 2 of 5','Box 3 of 5','Box 4 of 5','The Final Box ✨'];

function renderBox(idx){
  msgRevealed = false;
  const area = document.getElementById('boxArea');
  area.innerHTML='';
  document.getElementById('final').classList.remove('show');
  document.getElementById('stageTitle').textContent = TITLES[idx];
  document.getElementById('stageSub').textContent   = 'Tap the box to open it ✨';

  const B = BOXES[idx];
  const lv = idx+1;

  const wrap = document.createElement('div');
  wrap.className='ebox-wrap active';
  wrap.dataset.lv = lv;

  const closed = document.createElement('div');
  closed.className='closed-box';

  const lid = document.createElement('div');
  lid.className='cb-lid';
  lid.innerHTML=`<span class="bow">🎀</span><div class="ribbon-v"></div>`;
  lid.style.background=`linear-gradient(135deg,${B.color[0]},${B.color[1]})`;

  const base = document.createElement('div');
  base.className='cb-base';
  base.style.background=`linear-gradient(135deg,${B.color[0]},${B.color[1]})`;
  base.innerHTML=`<div class="ribbon-v"></div><div class="ribbon-h"></div>`;

  closed.appendChild(lid);
  closed.appendChild(base);
  closed.addEventListener('click', ()=>explodeBox(wrap, closed, lid, B, idx));

  const exploded = document.createElement('div');
  exploded.className='exploded-wrap';

  const cross = document.createElement('div');
  cross.className='cross';
  cross.style.perspective='800px';

  const positions = ['panel-top','panel-left','panel-right','panel-bottom'];
  positions.forEach((cls,i)=>{
    const panel = document.createElement('div');
    panel.className=`panel ${cls}`;
    const ph = B.photos[i];
    if(ph && ph.src){
      const img=document.createElement('img');
      img.src=ph.src; img.alt=ph.label;
      panel.appendChild(img);
    } else {
      panel.innerHTML=`<div class="ph-slot"><span class="phi">📸</span><span>${ph?ph.label:''}</span></div>`;
    }
    panel.style.boxShadow=`0 4px 18px rgba(0,0,0,.12)`;
    cross.appendChild(panel);
  });

  const centerCell = document.createElement('div');
  centerCell.className='center-cell';
  centerCell.style.gridColumn='2';
  centerCell.style.gridRow='2';

  const face = document.createElement('div');
  face.className='center-box-face';
  face.style.background=`linear-gradient(135deg,${B.color[0]},${B.color[1]})`;
  face.innerHTML=`<div class="ribbon-v"></div><div class="ribbon-h"></div>`;

  const msgCard = document.createElement('div');
  msgCard.className='msg-card';
  msgCard.innerHTML=`<p>${B.message}</p>`;

  const revBtn = document.createElement('button');
  revBtn.className='reveal-msg-btn';
  revBtn.addEventListener('click', ()=>{
    if(!msgRevealed){
      msgCard.classList.add('show');
      revBtn.style.pointerEvents='none';
      msgRevealed=true;
      document.getElementById('stageSub').textContent='Read your message, then open the next box 💌';
      const nxt = wrap.querySelector('.next-btn');
      nxt.classList.add('show');
    }
  });

  face.appendChild(msgCard);
  face.appendChild(revBtn);
  centerCell.appendChild(face);
  cross.appendChild(centerCell);
  exploded.appendChild(cross);

  const nxt = document.createElement('button');
  nxt.className='next-btn';
  nxt.textContent = idx < BOXES.length-1 ? 'Open the next box 🎁' : 'See your final surprise 💐';
  nxt.addEventListener('click',()=>advance(idx));
  exploded.appendChild(nxt);

  wrap.appendChild(closed);
  wrap.appendChild(exploded);

  const hint = document.createElement('div');
  hint.className='tap-hint';
  hint.id='tapHint';
  hint.textContent='👆 Tap the box to open it';
  wrap.appendChild(hint);

  area.appendChild(wrap);
}

function explodeBox(wrap, closed, lid, B, idx){
  lid.classList.add('lid-flyaway');
  confetti(60);
  setTimeout(()=>{
    closed.style.display='none';
    wrap.querySelector('.exploded-wrap').classList.add('show');
    const hint = document.getElementById('tapHint');
    if(hint){ hint.textContent='👆 Tap the inner box for your message'; }
    document.getElementById('stageSub').textContent='Now tap the inner box… 💌';
  }, 500);
}

function advance(idx){
  current = idx+1;
  buildProgress();
  if(current >= BOXES.length){
    showFinal();
  } else {
    renderBox(current);
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

function showFinal(){
  document.getElementById('boxArea').innerHTML='';
  document.getElementById('stageTitle').textContent='🌸 Your Final Gift';
  document.getElementById('stageSub').textContent='';
  document.getElementById('progress').innerHTML='';

  const fs = document.getElementById('final');
  document.getElementById('finalMsgText').innerHTML = FINAL_MSG.replace(/\n/g,'<br>');

  const strip = document.getElementById('finalStrip');
  strip.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='strip-ph';
    d.innerHTML=`<span style="font-size:1.2rem">📸</span><span>Memory ${i+1}</span>`;
    strip.appendChild(d);
  }

  fs.classList.add('show');
  confetti(100);
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  current=0;
  buildProgress();
  renderBox(0);
  document.getElementById('final').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function confetti(n=50){
  const cols=['#e8607a','#f2a0b0','#d4a843','#c9e87a','#7ac8e8','#e8c07a','#fff','#c04060'];
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='cpiece';
      const sz=5+Math.random()*7;
      c.style.cssText=`
        left:${Math.random()*100}vw;top:-8px;
        width:${sz}px;height:${sz}px;
        background:${cols[Math.floor(Math.random()*cols.length)]};
        border-radius:${Math.random()<.5?'50%':'2px'};
        animation-duration:${1.4+Math.random()*2.2}s;
        animation-delay:${Math.random()*.4}s;
      `;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),4000);
    },i*25);
  }
}
</script>
